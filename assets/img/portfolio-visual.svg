<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Abstract portfolio visual">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1530"/>
      <stop offset="45%" stop-color="#121f44"/>
      <stop offset="100%" stop-color="#6f54ff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <radialGradient id="orb1" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#35d0ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#35d0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="300" cy="190" r="180" fill="url(#orb1)" filter="url(#blur)"/>
  <circle cx="915" cy="590" r="240" fill="url(#orb2)" filter="url(#blur)"/>

  <g opacity="0.28">
    <rect x="120" y="110" width="960" height="600" rx="36" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="160" y="150" width="880" height="520" rx="30" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-dasharray="10 14"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="210" y="160" width="780" height="480" rx="32" fill="url(#glass)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <rect x="250" y="200" width="700" height="70" rx="18" fill="rgba(255,255,255,0.08)"/>
    <rect x="250" y="300" width="350" height="18" rx="9" fill="#ffffff" opacity="0.9"/>
    <rect x="250" y="338" width="520" height="14" rx="7" fill="#d8deff" opacity="0.78"/>
    <rect x="250" y="370" width="470" height="14" rx="7" fill="#d8deff" opacity="0.62"/>
    <rect x="250" y="430" width="160" height="46" rx="23" fill="#7c5cff"/>
    <rect x="428" y="430" width="160" height="46" rx="23" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="250" y="516" width="160" height="18" rx="9" fill="#ffffff" opacity="0.72"/>
    <rect x="250" y="548" width="260" height="14" rx="7" fill="#d8deff" opacity="0.58"/>

    <circle cx="840" cy="385" r="108" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="840" cy="356" r="42" fill="#ffffff" opacity="0.92"/>
    <path d="M760 462c18-54 57-80 80-80s62 26 80 80" fill="#ffffff" opacity="0.86"/>
    <circle cx="840" cy="385" r="138" fill="none" stroke="#7c5cff" stroke-width="6" stroke-opacity="0.35"/>
  </g>

  <g opacity="0.9">
    <rect x="272" y="228" width="92" height="18" rx="9" fill="#7c5cff"/>
    <rect x="376" y="228" width="72" height="18" rx="9" fill="#35d0ff"/>
    <rect x="460" y="228" width="116" height="18" rx="9" fill="#ffffff" opacity="0.22"/>
  </g>

  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" fill="none">
    <path d="M530 630c60-40 111-70 180-82"/>
    <path d="M610 640c92-44 146-56 250-44"/>
  </g>
</svg>